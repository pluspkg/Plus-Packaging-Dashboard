name: Fetch NPS Score

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-nps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch AskNicely NPS
        run: |
          curl -s \
            -H "X-apikey: ${{ secrets.ASKNICELY_API_KEY }}" \
            "https://pluspackaging.asknice.ly/api/v1/getnps?days=30" \
            -o nps.json
          echo "NPS fetched"

      - name: Commit and push nps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nps.json
          git diff --staged --quiet || git commit -m "Update NPS data [skip ci]"
          git push
