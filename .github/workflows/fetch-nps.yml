name: Fetch NPS Score

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-nps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch AskNicely NPS
        run: |
          curl -s \
            -H "X-apikey: 97f1e4aadabd14297917a05fd1d39eb2363a55f5b8e" \
            "https://pluspackaging.asknice.ly/api/v1/getnps" \
            -o nps.json
          echo "NPS data:"
          cat nps.json

      - name: Commit and push nps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
