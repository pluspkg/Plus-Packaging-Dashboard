<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Appointments Test</title>
<style>
  body{font-family:monospace;background:#0d1117;color:#e6edf3;padding:20px;font-size:13px}
  h2{color:#f97316;margin-top:24px}
  pre{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
  .ok{color:#3fb950}.err{color:#f85149}.mu{color:#8b949e}
  button{background:#f97316;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;margin:8px 4px}
  button:disabled{opacity:.5}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  label{color:#8b949e;font-size:12px}
  input{background:#161b22;border:1px solid #30363d;border-radius:4px;color:#e6edf3;padding:6px 10px;font-size:12px;width:100%;box-sizing:border-box}
</style>
</head>
<body>
<h1 style="color:#f97316">🔍 CRM Appointments Test</h1>

<div class="row">
  <button onclick="runTest('createdon')">Test: createdon filter</button>
  <button onclick="runTest('scheduledstart')">Test: scheduledstart filter</button>
  <button onclick="runTest('none')">Test: No date filter (all with new_fixed=true)</button>
  <button onclick="runRaw()">Raw: List recent appointments</button>
</div>

<div>
  <label>Date range (auto = today)</label>
  <div class="row">
    <input id="fromDate" placeholder="From (ISO) e.g. 2026-05-29T00:00:00.000Z">
    <input id="toDate" placeholder="To (ISO) e.g. 2026-05-29T23:59:59.999Z">
  </div>
</div>

<div id="status" class="mu">Not signed in — click a test button to authenticate</div>
<div id="output"></div>

<script>
const CFG = {
  clientId: "984139d6-9a6c-4da1-894d-34148ff1d570",
  tenantId: "5f50e638-38b0-44d5-8e87-9a4d7d01717d",
  dynamicsUrl: "https://pluspackaging.crm11.dynamics.com/api/data/v9.2",
  scopes: ["https://pluspackaging.crm11.dynamics.com/user_impersonation"],
};

const REDIRECT_URI = location.origin + location.pathname;
let dynToken = null;

function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");}
async function sha256(str){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));}
function rnd(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return b64url(a);}

async function getToken(params){
  const r=await fetch(`https://login.microsoftonline.com/${CFG.tenantId}/oauth2/v2.0/token`,
    {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
     body:new URLSearchParams(params)});
  return r.json();
}

async function ensureToken(){
  if(dynToken) return dynToken;
  // Try refresh token
  const rt = sessionStorage.getItem("rt");
  if(rt){
    const j = await getToken({client_id:CFG.clientId,grant_type:"refresh_token",refresh_token:rt,scope:CFG.scopes.join(" ")+" offline_access"});
    if(j.access_token){
      dynToken=j.access_token;
      if(j.refresh_token) sessionStorage.setItem("rt",j.refresh_token);
      return dynToken;
    }
  }
  // PKCE flow
  const ver=rnd(43),ch=b64url(await sha256(ver)),st=rnd(16);
  sessionStorage.setItem("pkce_ver",ver);sessionStorage.setItem("pkce_st",st);
  const p=new URLSearchParams({client_id:CFG.clientId,response_type:"code",redirect_uri:REDIRECT_URI,
    scope:CFG.scopes.join(" ")+" offline_access",code_challenge:ch,code_challenge_method:"S256",state:st,response_mode:"query"});
  location.href=`https://login.microsoftonline.com/${CFG.tenantId}/oauth2/v2.0/authorize?`+p;
}

async function dynFetch(path){
  const tok=await ensureToken();
  const r=await fetch(CFG.dynamicsUrl+path,{headers:{
    "Authorization":"Bearer "+tok,
    "Accept":"application/json",
    "OData-MaxVersion":"4.0",
    "OData-Version":"4.0",
    "Prefer":'odata.include-annotations="*",odata.maxpagesize=50'
  }});
  const text = await r.text();
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${text.slice(0,500)}`);
  return JSON.parse(text);
}

function getDateRange(){
  const now=new Date();
  const s=new Date(now);s.setHours(0,0,0,0);
  const e=new Date(now);e.setHours(23,59,59,999);
  const from = document.getElementById("fromDate").value || s.toISOString();
  const to   = document.getElementById("toDate").value   || e.toISOString();
  return {from, to};
}

async function runTest(mode){
  const out=document.getElementById("output");
  const stat=document.getElementById("status");
  out.innerHTML="";
  stat.textContent="Running...";
  stat.className="mu";
  try{
    const {from, to} = getDateRange();
    let url;
    if(mode==="createdon"){
      url=`/appointments?$select=activityid,subject,new_fixed,createdon,scheduledstart&$filter=createdon ge ${from} and createdon le ${to} and new_fixed eq true&$count=true`;
    } else if(mode==="scheduledstart"){
      url=`/appointments?$select=activityid,subject,new_fixed,createdon,scheduledstart&$filter=scheduledstart ge ${from} and scheduledstart le ${to} and new_fixed eq true&$count=true`;
    } else {
      url=`/appointments?$select=activityid,subject,new_fixed,createdon,scheduledstart&$filter=new_fixed eq true&$orderby=createdon desc&$top=10`;
    }

    stat.textContent=`Querying: ${CFG.dynamicsUrl}${url}`;
    const data = await dynFetch(url);
    const count = data["@odata.count"] ?? data.value?.length ?? "?";
    stat.innerHTML=`<span class="ok">✓ Done — ${count} record(s) found</span>`;
    out.innerHTML=`<h2>Query (${mode})</h2><pre>${url}</pre><h2>Count</h2><pre>${count}</pre><h2>Records</h2><pre>${JSON.stringify(data.value||data, null, 2)}</pre>`;
  } catch(e){
    stat.innerHTML=`<span class="err">✗ Error: ${e.message}</span>`;
    out.innerHTML=`<pre class="err">${e.message}</pre>`;
  }
}

async function runRaw(){
  const out=document.getElementById("output");
  const stat=document.getElementById("status");
  out.innerHTML="";
  stat.textContent="Fetching recent appointments...";
  try{
    const url=`/appointments?$select=activityid,subject,new_fixed,createdon,scheduledstart,statecode&$orderby=createdon desc&$top=10`;
    const data = await dynFetch(url);
    stat.innerHTML=`<span class="ok">✓ Got ${data.value?.length} recent appointments</span>`;
    out.innerHTML=`<h2>Last 10 appointments (any status)</h2><pre>${JSON.stringify(data.value, null, 2)}</pre>`;
  } catch(e){
    stat.innerHTML=`<span class="err">✗ ${e.message}</span>`;
    out.innerHTML=`<pre class="err">${e.message}</pre>`;
  }
}

// Handle auth redirect
(async()=>{
  const params=new URLSearchParams(location.search);
  if(params.has("code")){
    const ver=sessionStorage.getItem("pkce_ver");
    const j=await getToken({client_id:CFG.clientId,grant_type:"authorization_code",
      code:params.get("code"),redirect_uri:REDIRECT_URI,code_verifier:ver,
      scope:CFG.scopes.join(" ")+" offline_access"});
    if(j.access_token){
      dynToken=j.access_token;
      if(j.refresh_token) sessionStorage.setItem("rt",j.refresh_token);
      history.replaceState({},"",location.pathname);
      document.getElementById("status").innerHTML=`<span class="ok">✓ Authenticated — click a test button</span>`;
    }
  } else {
    const rt=sessionStorage.getItem("rt");
    if(rt){
      const j=await getToken({client_id:CFG.clientId,grant_type:"refresh_token",refresh_token:rt,scope:CFG.scopes.join(" ")+" offline_access"});
      if(j.access_token){
        dynToken=j.access_token;
        document.getElementById("status").innerHTML=`<span class="ok">✓ Token refreshed — click a test button</span>`;
      }
    }
  }
})();
</script>
</body>
</html>
